version: 2

models:
  - name: int_delivered_order_items
    description: "Intermediate model containing delivered order items enriched with customer, product category and time information."

    columns:
      - name: order_id
        description: "Unique identifier of the order."
        tests:
          - not_null

      - name: order_item_id
        description: "Identifier of the item within the order."
        tests:
          - not_null

      - name: product_id
        description: "Unique identifier of the product."
        tests:
          - not_null

      - name: customer_id
        description: "Customer identifier associated with the order."
        tests:
          - not_null

      - name: customer_unique_id
        description: "Unique customer identifier used to identify repeat customers."
        tests:
          - not_null

      - name: customer_state
        description: "Customer state."
        tests:
          - not_null

      - name: order_month
        description: "Month of the order purchase."
        tests:
          - not_null

      - name: category
        description: "Product category in English when available."
        tests:
          - not_null

      - name: price
        description: "Product item price."
        tests:
          - not_null

      - name: freight_value
        description: "Freight value associated with the item."
        tests:
          - not_null