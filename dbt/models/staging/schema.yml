version: 2

models:
  - name: stg_orders
    description: "Cleaned staging model for Olist orders."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved

  - name: stg_order_items
    description: "Cleaned staging model for order items."
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned staging model for customers."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        tests:
          - not_null

      - name: customer_state
        tests:
          - not_null

  - name: stg_products
    description: "Cleaned staging model for products."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_category_translation
    description: "Product category translation table."
    columns:
      - name: product_category_name
        tests:
          - not_null
          - unique

      - name: product_category_name_english
        tests:
          - not_null

  - name: stg_payments
    description: "Cleaned staging model for order payments."
    columns:
      - name: order_id
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null

      - name: payment_installments
        tests:
          - not_null

      - name: payment_value
        tests:
          - not_null

  - name: stg_reviews
    description: "Cleaned staging model for customer reviews."
    columns:
      - name: review_id
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: review_score
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
              
  - name: stg_sellers
    description: "Cleaned staging model for Olist sellers."
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

      - name: seller_city
        tests:
          - not_null

      - name: seller_state
        tests:
          - not_null            
