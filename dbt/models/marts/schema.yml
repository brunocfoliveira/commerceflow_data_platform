version: 2

models:
  - name: mart_sales_by_category
    description: "Sales performance by product category for delivered orders."
    columns:
      - name: category
        description: "Product category in English when available."
        tests:
          - not_null
          - unique

      - name: delivered_orders
        description: "Number of delivered orders in the category."
        tests:
          - not_null

      - name: items_sold
        description: "Number of sold items in the category."
        tests:
          - not_null

      - name: product_revenue
        description: "Total product revenue for delivered orders."
        tests:
          - not_null

      - name: freight_revenue
        description: "Total freight revenue for delivered orders."
        tests:
          - not_null

      - name: average_order_value
        description: "Average product revenue per delivered order."
        tests:
          - not_null

  - name: mart_monthly_revenue
    description: "Monthly revenue and order volume for delivered orders."
    columns:
      - name: order_month
        description: "Month of the order purchase."
        tests:
          - not_null
          - unique

      - name: delivered_orders
        tests:
          - not_null

      - name: items_sold
        tests:
          - not_null

      - name: product_revenue
        tests:
          - not_null

      - name: freight_revenue
        tests:
          - not_null

      - name: average_order_value
        tests:
          - not_null

  - name: mart_state_performance
    description: "Sales performance by customer state for delivered orders."
    columns:
      - name: customer_state
        description: "Customer state."
        tests:
          - not_null
          - unique

      - name: delivered_orders
        tests:
          - not_null

      - name: items_sold
        tests:
          - not_null

      - name: product_revenue
        tests:
          - not_null

      - name: freight_revenue
        tests:
          - not_null

      - name: average_order_value
        tests:
          - not_null

  - name: mart_customer_retention
    description: "Customer retention summary based on delivered orders."
    columns:
      - name: total_customers
        tests:
          - not_null

      - name: repeat_customers
        tests:
          - not_null

      - name: repeat_customer_percentage
        tests:
          - not_null
  
  - name: mart_payment_performance
    description: "Payment performance by payment type for delivered orders."
    columns:
      - name: payment_type
        description: "Payment method used by the customer."
        tests:
          - not_null
          - unique

      - name: orders
        description: "Number of delivered orders using this payment type."
        tests:
          - not_null

      - name: payment_records
        description: "Number of payment records for this payment type."
        tests:
          - not_null

      - name: total_payment_value
        description: "Total payment value for delivered orders."
        tests:
          - not_null

      - name: average_payment_value
        description: "Average payment value for delivered orders."
        tests:
          - not_null

      - name: average_installments
        description: "Average number of payment installments."
        tests:
          - not_null
          
  - name: mart_delivery_review_performance
    description: "Delivery performance and customer review score by delivery status."
    columns:
      - name: delivery_status
        description: "Whether the order was delivered on time or late."
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values:
                  - on_time
                  - late

      - name: delivered_orders
        description: "Number of delivered orders."
        tests:
          - not_null

      - name: average_delivery_days
        description: "Average number of days between purchase and delivery."
        tests:
          - not_null

      - name: average_review_score
        description: "Average customer review score."